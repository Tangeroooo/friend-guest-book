<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>실시간 방명록 라이브</title>
  </head>
  <body class="live-body">
    <main class="projector-wrap">
      <section class="projector-feed">
        <div id="feed" class="feed-list" aria-live="polite"></div>
      </section>

      <section class="projector-pdf">
        <iframe
          id="pdfFrame"
          class="pdf-frame"
          title="행사 안내 PDF"
          loading="eager"
          referrerpolicy="no-referrer"
        ></iframe>
      </section>
    </main>

    <script type="module" src="/src/live.js"></script>
  </body>
</html>
