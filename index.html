<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>실시간 방명록</title>
  </head>
  <body class="home-body">
    <main class="home-wrap">
      <section class="hero">
        <p class="tag">Friend Guest Book</p>
        <h1>총회용 실시간 방명록</h1>
        <p>
          작성, 라이브 화면, PDF 관리 화면을 분리해 현장 운영 집중도를 높였습니다.
        </p>
      </section>

      <section class="home-grid">
        <a class="home-card home-card-write" href="./write.html">
          <h2>방명록 작성</h2>
          <p>회중이 이름과 메시지를 입력하는 화면입니다.</p>
          <span>open /write</span>
        </a>

        <a class="home-card home-card-live" href="./live.html">
          <h2>라이브 화면</h2>
          <p>프로젝터 전용 표시 화면입니다. 방명록과 안내 PDF만 보여줍니다.</p>
          <span>open /live</span>
        </a>

        <a class="home-card home-card-admin" href="./admin.html">
          <h2>관리자 설정</h2>
          <p>관리자 로그인 후 PDF 업로드, 선택, 삭제를 처리하는 전용 화면입니다.</p>
          <span>open /admin</span>
        </a>
      </section>
    </main>
    <script type="module" src="/src/home.js"></script>
  </body>
</html>
