<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>실시간 방명록 라이브</title>
    <script type="module" crossorigin src="/friend-guest-book/assets/live-D91-0DW7.js"></script>
    <link rel="modulepreload" crossorigin href="/friend-guest-book/assets/base-BsSoNj6H.js">
    <link rel="modulepreload" crossorigin href="/friend-guest-book/assets/supabase-CMlqUpYb.js">
    <link rel="modulepreload" crossorigin href="/friend-guest-book/assets/pdfViewer-BZ2Dhdmt.js">
    <link rel="stylesheet" crossorigin href="/friend-guest-book/assets/base-D6UsKcMK.css">
    <link rel="stylesheet" crossorigin href="/friend-guest-book/assets/live-lMTwIsfj.css">
  </head>
  <body class="live-body">
    <main class="projector-wrap">
      <section class="projector-feed">
        <div id="feed" class="feed-list" aria-live="polite"></div>
      </section>
      <div
        id="splitter"
        class="projector-splitter"
        role="separator"
        aria-label="방명록과 PDF 영역 크기 조절"
        aria-orientation="vertical"
        aria-valuemin="20"
        aria-valuemax="80"
        aria-valuenow="38"
        tabindex="0"
      ></div>

      <section class="projector-pdf">
        <div
          id="pdfViewer"
          class="pdf-viewer"
          title="행사 안내 PDF 뷰어"
          aria-label="행사 안내 PDF 뷰어"
        ></div>
        <p id="pdfPageInfo" class="pdf-page-info is-hidden" aria-live="polite"></p>
      </section>
    </main>

  </body>
</html>
